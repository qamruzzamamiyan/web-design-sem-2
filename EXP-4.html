<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Grade Calculator</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        text-align: center;
        padding: 30px;
    }

    .container {
        width: 400px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0px 0px 10px gray;
    }

    h2 {
        color: #333;
    }

    input {
        width: 90%;
        padding: 10px;
        margin: 10px 0;
    }

    button {
        padding: 10px 20px;
        background-color: blue;
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 5px;
    }

    button:hover {
        background-color: darkblue;
    }

    #result {
        margin-top: 20px;
        font-size: 18px;
        font-weight: bold;
    }
</style>
</head>

<body>

<div class="container">

    <h2>Student Grade Calculator</h2>

    <label>Enter Number of Subjects:</label>
    <input type="number" id="subjects" min="1">

    <button onclick="calculateResult()">
        Calculate Result
    </button>

    <div id="result"></div>

</div>

<script>

function calculateResult()
{
    let numSubjects = parseInt(document.getElementById("subjects").value);

    if(isNaN(numSubjects) || numSubjects <= 0)
    {
        alert("Please enter a valid number of subjects.");
        return;
    }

    let total = 0;
    let pass = true;

    // Loop for taking marks
    for(let i = 1; i <= numSubjects; i++)
    {
        let marks = parseFloat(prompt("Enter marks for Subject " + i));

        if(isNaN(marks) || marks < 0 || marks > 100)
        {
            alert("Please enter marks between 0 and 100.");
            return;
        }

        total += marks;

        if(marks < 35)
        {
            pass = false;
        }
    }

    let average = total / numSubjects;

    let grade;

    // Conditional Statements
    if(average >= 90)
    {
        grade = "A+";
    }
    else if(average >= 80)
    {
        grade = "A";
    }
    else if(average >= 70)
    {
        grade = "B";
    }
    else if(average >= 60)
    {
        grade = "C";
    }
    else if(average >= 50)
    {
        grade = "D";
    }
    else
    {
        grade = "F";
    }

    let resultStatus;

    if(pass)
    {
        resultStatus = "PASS";
    }
    else
    {
        resultStatus = "FAIL";
    }

    document.getElementById("result").innerHTML =
    `
    <p>Total Marks: ${total}</p>
    <p>Average Marks: ${average.toFixed(2)}</p>
    <p>Grade: ${grade}</p>
    <p>Result: ${resultStatus}</p>
    `;
}

</script>

</body>
</html>
